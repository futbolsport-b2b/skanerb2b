<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>B2B PICKER PRO</title>
    <link rel="stylesheet" href="style.css?v=12">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div id="header-left">
                <span id="label-top">SYSTEM B2B</span>
                <div id="order-title">SKANUJ ZAMÓWIENIE</div>
            </div>
            <button id="btn-finish-order" style="display:none;">ZAKOŃCZ</button>
        </header>

        <div id="camera-wrapper">
            <div id="reader"></div>
        </div>

        <div class="ui-panel">
            <div id="task-card" style="display: none;">
                <div class="task-header">POZYCJA LP: <span id="task-lp">-</span></div>
                <div id="task-nazwa">NAZWA PRODUKTU</div>
                <div id="task-kat">NR KAT: -</div>
                <div id="task-qty-info">DO WYDANIA: <span id="task-qty">-</span></div>
                <button id="btn-trigger-scan">SKANUJ</button>
            </div>

            <div id="qty-panel">
                <div class="qty-container">
                    <input type="number" id="quantity-input" pattern="\d*" inputmode="numeric">
                    <button id="btn-confirm-qty">✔</button>
                </div>
            </div>

            <div id="status-msg">Zainicjuj skanowanie kodu QR</div>
        </div>
    </div>
    <script src="app.js?v=12"></script>
</body>
</html>
