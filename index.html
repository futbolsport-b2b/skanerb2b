<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>B2B SCAN v8</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div id="order-id-display">SCAN QR</div>
            <button id="btn-reset" onclick="location.reload()">RESET</button>
        </header>

        <div id="camera-wrapper">
            <div id="reader"></div>
        </div>

        <div class="ui-panel">
            <div id="status-msg">Czekam na QR...</div>
            
            <div id="qty-section">
                <div id="scanned-product-name">PRODUKT</div>
                <div class="compact-input-row">
                    <input type="number" id="quantity-input" pattern="\d*" inputmode="numeric" value="1" maxlength="4">
                    <button id="btn-confirm-qty">✔</button>
                    <button id="btn-cancel-qty">✖</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
