<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TERMINAL B2B PRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div id="order-info">
                <span id="label-status">SYSTEM GOTOWY</span>
                <h2 id="order-id-display">ZESKANUJ DOKUMENT</h2>
            </div>
            <button id="btn-reset" onclick="location.reload()">RESET</button>
        </header>

        <div id="camera-wrapper">
            <div id="reader"></div>
        </div>

        <div class="ui-panel">
            <div id="status-msg">Czekam na kod QR zamówienia...</div>
            
            <div id="qty-section" style="display: none;">
                <div class="qty-card">
                    <span id="scanned-product-name">EAN: 000000000000</span>
                    <div class="qty-input-group">
                        <input type="number" id="quantity-input" pattern="\d*" inputmode="numeric" value="1">
                        <button id="btn-confirm-qty">DODAJ</button>
                    </div>
                    <button id="btn-cancel-qty">ANULUJ SKAN</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
