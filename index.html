<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>B2B SCAN v26 Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=26">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div id="error-overlay">
        <div class="error-content">
            <svg class="error-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"></path></svg>
            <span id="error-text">BŁĘDNY PRODUKT</span>
        </div>
    </div>
    
    <div class="app-container">
        <header>
            <div id="header-info">
                <span id="label-status">TERMINAL</span>
                <div id="order-title-container">
                    <span id="order-prefix">ZAM:</span> 
                    <span id="order-number-val">ZESKANUJ</span>
                </div>
            </div>
            <button id="btn-finish-icon" style="display:none;" title="Anuluj">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path></svg>
            </button>
        </header>

        <div id="camera-wrapper">
            <div id="reader"></div>
            <div id="scanner-ui-overlay">
                <div class="corner tl"></div><div class="corner tr"></div>
                <div class="corner bl"></div><div class="corner br"></div>
                <div id="laser-line"></div>
            </div>
        </div>

        <div class="ui-panel">
            <div id="task-card" style="display: none;">
                <div class="nav-row">
                    <button id="btn-prev" class="nav-btn" title="Poprzedni">
                        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"></path></svg>
                    </button>
                    <span id="task-order-label">POZYCJA: <b id="task-lp-val">--</b></span>
                    <button id="btn-next" class="nav-btn" title="Następny">
                        <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"></path></svg>
                    </button>
                </div>
                <div id="product-data-container">
                    <h1 id="task-nazwa-big">Wczytywanie...</h1>
                    <div id="task-kat-val">KATALOG: ---</div>
                    <div class="qty-visual-group">
                        <div class="task-qty-label">ZAMÓWIONO</div>
                        <div id="task-qty-val">--</div>
                    </div>
                </div>
                <button id="btn-scan-item">
                    <svg class="icon-btn" viewBox="0 0 24 24"><path d="M17.58 4H19v1.41L16.41 8 15 6.59 17.58 4M4 4h1.41L8 6.58 6.59 8 4 5.41V4m16 16v-1.42L17.41 16 16 17.42 18.59 20H20M4 20h1.42L8 17.41 6.58 16 4 18.59V20m7-10.88c.88-.12 1.8.19 2.47.85s.98 1.59.86 2.47c-.12.89-.62 1.63-1.31 2.07L13 18h-2l-.02-3.48c-.7-.44-1.19-1.19-1.31-2.08-.12-.88.19-1.8.85-2.47.67-.67 1.6-1 2.48-.87M12 7c-2.76 0-5 2.24-5 5 0 1.25.47 2.4 1.23 3.28l1.43-1.43C9.25 13.3 9 12.68 9 12c0-1.66 1.34-3 3-3s3 1.34 3 3c0 .68-.25 1.3-.66 1.86l1.43 1.43C16.53 14.4 17 13.25 17 12c0-2.76-2.24-5-5-5z"></path></svg>
                    SKANUJ PRODUKT
                </button>
            </div>

            <div id="qty-panel" style="display: none;">
                <div class="qty-modal-content">
                    <div class="qty-header">
                        <div id="qty-nazwa-info">---</div>
                        <div id="qty-kat-info">Nr Kat: <span id="kat-val-display">---</span></div>
                    </div>
                    <div class="qty-info-bar">
                        Pozostało do zebrania: <span id="qty-remain-val">--</span>
                    </div>
                    <div class="qty-input-group">
                        <input type="number" id="qty-input" inputmode="numeric" pattern="[0-9]*" placeholder="0">
                        <button id="btn-qty-ok">
                            <span class="btn-text">✔ DODAJ</span>
                            <div class="spinner"></div> </button>
                    </div>
                    <button id="btn-qty-cancel">Anuluj</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js?v=26"></script>
</body>
</html>
