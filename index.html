<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>B2B SCAN v15</title>
    <link rel="stylesheet" href="style.css?v=15">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div id="error-overlay">NIEWŁAŚCIWY KOD PRODUKTU</div>
    
    <div class="app-container">
        <header>
            <div id="header-info">
                <span id="label-status">SYSTEM GOTOWY</span>
                <div id="order-title">SKANUJ ZAMÓWIENIE</div>
            </div>
            <button id="btn-finish" style="display:none;">ZAKOŃCZ</button>
        </header>

        <div id="camera-wrapper">
            <div id="reader"></div>
            <div id="laser-line"></div>
        </div>

        <div class="ui-panel">
            <div id="task-card" style="display: none;">
                <div class="task-lp">POZYCJA LP: <span id="task-lp-val">-</span></div>
                <div id="task-nazwa">Ładowanie...</div>
                <div id="task-kat">KAT: -</div>
                <div id="task-qty-info">DO WYDANIA: <span id="task-qty-val">-</span></div>
                <button id="btn-scan-item">SKANUJ PRODUKT</button>
            </div>

            <div id="qty-panel">
                <div class="qty-box">
                    <input type="number" id="qty-input" inputmode="decimal" pattern="[0-9]*">
                    <button id="btn-qty-ok">✔</button>
                </div>
            </div>
            <div id="status-footer">Czekam na kod QR...</div>
        </div>
    </div>
    <script src="app.js?v=15"></script>
</body>
</html>
