<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B2B SCANNER PRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">TERMINAL B2B</div>
            <div id="order-badge" class="badge-waiting">OCZEKIWANIE NA QR</div>
        </header>

        <div id="reader" style="width: 100%; min-height: 300px;"></div>

        <div class="ui-panel">
            <div class="info-box">
                <input type="text" id="status-display" value="ZESKANUJ QR ZAMÓWIENIA" readonly>
            </div>
            <div id="debug-log">Gotowy do skanowania QR</div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
