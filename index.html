<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>B2B TERMINAL v35</title>
    <link rel="stylesheet" href="style.css?v=35">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div id="error-overlay"><div id="error-text">BŁĄD</div></div>
    
    <div class="app-container">
        <header>
            <div id="header-content">
                <div class="brand-row">
                    <span class="status-dot"></span>
                    <span class="brand-title">TERMINAL MAGAZYNOWY</span>
                </div>
                <div id="order-info">
                    <span class="label">ZAMÓWIENIE</span>
                    <div id="order-val">ZESKANUJ KOD QR</div>
                </div>
            </div>
            <button id="btn-finish-icon" style="display:none;">✕</button>
        </header>

        <main id="main-view">
            <section id="scanner-box">
                <div id="scanner-instruction" style="display:none;">
                    <span class="instruction-label">SZUKANY PRODUKT:</span>
                    <div id="target-kat-display">---</div>
                </div>
                <div id="reader"></div>
                <div id="scanner-overlay">
                    <div class="corner tl"></div><div class="corner tr"></div>
                    <div class="corner bl"></div><div class="corner br"></div>
                    <div id="laser-line"></div>
                </div>
            </section>

            <section id="task-panel" style="display:none;">
                <div class="task-card">
                    <div class="task-nav">
                        <button id="btn-prev" class="btn-circle">◀</button>
                        <span class="task-lp-info">POZYCJA <b id="task-lp">--</b></span>
                        <button id="btn-next" class="btn-circle">▶</button>
                    </div>
                    
                    <div class="task-content">
                        <h1 id="task-name">Ładowanie...</h1>
                        <div id="task-kat">---</div>
                        <div class="task-qty-box">
                            <span class="qty-label">DO POBRANIA</span>
                            <div id="task-qty">0</div>
                        </div>
                    </div>
                    
                    <button id="btn-scan-item" class="btn-primary">SKANUJ PRODUKT</button>
                </div>
            </section>
        </main>

        <div id="qty-modal">
            <div class="sheet">
                <div class="sheet-header">
                    <h2 id="qty-name">Nazwa Produktu</h2>
                    <span id="qty-kat-val">Nr Kat: ---</span>
                </div>
                
                <div class="remain-badge">Pozostało do zebrania: <b id="qty-remain">0</b></div>
                
                <div class="input-group">
                    <input type="number" id="qty-input" inputmode="numeric" placeholder="0">
                    <button id="btn-qty-ok" class="btn-success">ZATWIERDŹ</button>
                </div>
                
                <button id="btn-qty-cancel" class="btn-cancel">ANULUJ</button>
            </div>
        </div>
    </div>
    <script src="app.js?v=35"></script>
</body>
</html>
