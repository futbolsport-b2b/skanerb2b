<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL B2B PRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div id="order-badge">SKANUJ KOD QR</div>
            <button id="btn-finish" style="display:none;">ZAKOŃCZ</button>
        </header>

        <div id="reader"></div>

        <div class="ui-panel">
            <input type="text" id="status-display" value="CZEKAM NA ZAMÓWIENIE" readonly>
            
            <div id="qty-section">
                <label style="font-size: 0.8rem; color: #94a3b8;">WPROWADŹ ILOŚĆ:</label>
                <div class="qty-controls">
                    <input type="number" id="quantity-input" value="1">
                    <button id="btn-confirm-qty" class="btn-confirm">OK</button>
                </div>
            </div>

            <div id="debug-log">v2.1 - Produkcja</div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
