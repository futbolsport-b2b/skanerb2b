<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL B2B - Walidacja</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">B2B SCANNER v2</div>
            <div id="order-badge">BRAK ZAMÓWIENIA</div>
        </header>

        <div id="scanner-container">
            <div id="interactive" class="viewport"></div>
            <div class="scan-overlay">
                <div class="laser"></div>
            </div>
        </div>

        <div class="ui-panel">
            <div class="info-box">
                <label>Status operacji:</label>
                <input type="text" id="status-display" value="ZESKANUJ NR ZAMÓWIENIA" readonly>
            </div>
            
            <button id="btn-action">URUCHOM APARAT</button>
            <div id="debug-log">Czekam na inicjalizację...</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
