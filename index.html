<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>B2B TERMINAL v33</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=33">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div id="error-overlay"><div id="error-text">BŁĄD</div></div>
    
    <div class="app-container">
        <header>
            <div id="header-info">
                <span class="label">TERMINAL MAGAZYNOWY</span>
                <div id="order-title">ZAM: <span id="order-val">ZESKANUJ KOD QR</span></div>
            </div>
            <button id="btn-finish-icon" style="display:none;">✕</button>
        </header>

        <div id="camera-section">
            <div id="scanner-instruction" style="display:none;">
                Skanuj towar o Nr Kat:<br>
                <span id="target-kat-display">---</span>
            </div>

            <div id="reader"></div>
            <div id="scanner-visual">
                <div class="corner tl"></div><div class="corner tr"></div>
                <div class="corner bl"></div><div class="corner br"></div>
                <div id="laser"></div>
            </div>
        </div>

        <div class="content-panel">
            <div id="task-card" style="display:none;">
                <div class="nav-bar">
                    <button id="btn-prev" class="nav-btn">◀</button>
                    <div class="pos-label">POZYCJA ZAMÓWIENIA: <b id="task-lp">--</b></div>
                    <button id="btn-next" class="nav-btn">▶</button>
                </div>
                <div id="data-container">
                    <h1 id="task-name">Wczytywanie...</h1>
                    <div id="task-kat">---</div>
                    <div class="qty-badge"><div id="task-qty">--</div></div>
                </div>
                <button id="btn-scan-item">SKANUJ PRODUKT</button>
            </div>

            <div id="qty-modal">
                <div class="modal-body">
                    <div id="qty-name">---</div>
                    <div id="qty-kat-label">Kat: <span id="qty-kat-val">---</span></div>
                    <div class="remain-tag">Pozostało: <b id="qty-remain">0</b></div>
                    <div class="input-row">
                        <input type="number" id="qty-input" inputmode="numeric" placeholder="0">
                        <button id="btn-qty-ok">✔</button>
                    </div>
                    <button id="btn-qty-cancel">ANULUJ</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js?v=33"></script>
</body>
</html>
